zotero:
  user_id: ${oc.env:ZOTERO_ID}
  api_key: ${oc.env:ZOTERO_KEY}
  include_path: null # Or set a list of glob patterns, e.g. ["2026/survey/**","2026/reading-group/**"]

email:
  sender: ${oc.env:SENDER}
  receiver: ${oc.env:RECEIVER}
  smtp_server: smtp.qq.com
  smtp_port: 465
  sender_password: ${oc.env:SENDER_PASSWORD}

llm:
  api:
    key: ${oc.env:OPENAI_API_KEY}
    base_url: ${oc.env:OPENAI_API_BASE}
  generation_kwargs:
    model: gpt-4o-mini

source:
  arxiv:
    # The candidate set is deliberately focused on theoretical CS. Zotero-based
    # reranking then prioritizes topics such as algorithms, complexity, learning
    # theory, mechanism design, and optimization within these categories.
    category: ["cs.DS","cs.CC","cs.DM","cs.LO","cs.GT","cs.LG"]
    include_cross_list: false

executor:
  debug: ${oc.env:DEBUG,null}
  source: ['arxiv']
